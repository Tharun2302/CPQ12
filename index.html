<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Complete CPQ Tool with Pricing Engine</title>
    
    <!-- Performance: DNS prefetch for external domains -->
    <link rel="dns-prefetch" href="https://clarity.ms" />
    <link rel="dns-prefetch" href="https://www.clarity.ms" />
    
    <!-- Performance: Preconnect to critical origins -->
    <link rel="preconnect" href="https://clarity.ms" crossorigin />
    
    <!-- Signature fonts for e-sign Type option -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Allura&family=Dancing+Script:wght@400;700&family=Great+Vibes&family=Pacifico&family=Sacramento&display=swap" rel="stylesheet" />
    <!-- Performance: Preload critical CSS (will be injected by Vite) -->
    <link rel="modulepreload" href="/src/main.tsx" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
