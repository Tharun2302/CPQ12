version: '3.8'

networks:
  cpq-network:
    driver: bridge

services:
  # PDF conversion microservice - keeps LibreOffice warm for fast conversions (1-2s vs 8-10s)
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: cpq-gotenberg
    networks:
      - cpq-network
    restart: unless-stopped
    # Published so a host-run Node app can reach it at http://localhost:3004.
    # (Inside the Docker network it is also reachable at http://gotenberg:3000.)
    ports:
      - "3004:3000"

  # Alternative: Use OnlyOffice Document Server (more features) - activate with: docker-compose --profile onlyoffice up
  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: cpq-onlyoffice
    networks:
      - cpq-network
    environment:
      - JWT_ENABLED=false
      - DB_TYPE=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=onlyoffice
      - DB_USER=onlyoffice
      - DB_PWD=onlyoffice
    ports:
      - "3003:80"
    volumes:
      - ./onlyoffice-data:/var/www/onlyoffice/Data
      # Config override: allow OnlyOffice to call back to host.docker.internal (private IP).
      # Without this, OnlyOffice 9.3+ refuses to send save callbacks for security reasons.
      - ./onlyoffice-local-override.json:/etc/onlyoffice/documentserver/local-production-linux.json:ro
    depends_on:
      - postgres
    restart: unless-stopped
    profiles:
      - onlyoffice

  postgres:
    image: postgres:13
    container_name: cpq-postgres
    networks:
      - cpq-network
    environment:
      - POSTGRES_DB=onlyoffice
      - POSTGRES_USER=onlyoffice
      - POSTGRES_PASSWORD=onlyoffice
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    profiles:
      - onlyoffice
